<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Log — SureVera</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B3A6B;
      --dark-navy: #0D1B2E;
      --orange: #E8612A;
      --bg: #F0F3F8;
      --card-bg: #FFFFFF;
      --text: #1E293B;
      --text-sec: #64748B;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --shadow: 0 1px 4px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.1);
      --section-hover: #F9FAFB;
      --input-bg: #FFFFFF;
    }

    body.dark-mode, [data-theme="dark"],
    [data-theme="dark"] body, [data-theme="dark"] {
      --bg: #0A1422;
      --card-bg: #132240;
      --text: #FFFFFF;
      --text-sec: #8B9EC7;
      --text-muted: #5A6E99;
      --border: rgba(255,255,255,0.10);
      --shadow: 0 1px 4px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.5);
      --section-hover: #1A3060;
      --input-bg: #1A3060;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .toolbar {
      background: linear-gradient(135deg, #0D1B2E 0%, #1B3A6B 100%);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      position: relative;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .page-title {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .page-title h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    .page-title p {
      font-size: 0.9rem;
      color: var(--text-sec);
    }

    /* ── Top bar: search + actions ── */
    .top-bar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .search-wrapper {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrapper svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
    }
    .search-input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.4rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--orange); }

    .cat-filter {
      padding: 0.55rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .action-btn:hover { background: var(--orange); color: white; border-color: var(--orange); }
    .action-btn svg { width: 15px; height: 15px; }

    .action-btn.primary {
      background: var(--orange);
      color: white;
      border-color: var(--orange);
    }
    .action-btn.primary:hover { opacity: 0.9; }

    /* ── Add Entry Form ── */
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 1.25rem;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .form-header:hover { background: var(--section-hover); }
    .form-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .form-chevron {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: transform 0.25s;
    }
    .form-card.open .form-chevron { transform: rotate(180deg); }

    .form-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .form-card.open .form-body {
      max-height: 2000px;
    }
    .form-inner {
      padding: 0 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .form-row { display: flex; gap: 0.75rem; }
    .form-row > * { flex: 1; }

    label.field-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
    }

    .field-input, .field-textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-input:focus, .field-textarea:focus { border-color: var(--orange); }
    .field-textarea { resize: vertical; min-height: 80px; }
    .field-textarea.large { min-height: 180px; }

    .cat-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .cat-checkbox {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-sec);
      transition: all 0.15s;
      user-select: none;
    }
    .cat-checkbox input { display: none; }
    .cat-checkbox.selected {
      background: var(--orange);
      color: white;
      border-color: var(--orange);
    }

    .save-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 1.5rem;
      border-radius: 10px;
      border: none;
      background: var(--orange);
      color: white;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
      align-self: flex-start;
    }
    .save-btn:hover { opacity: 0.9; }

    /* ── Entry Cards ── */
    .entry-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 0.75rem;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }
    .entry-card:hover { box-shadow: var(--shadow-hover); }

    .entry-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.25rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .entry-header:hover { background: var(--section-hover); }

    .entry-date {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--orange);
      white-space: nowrap;
      min-width: 75px;
    }
    .entry-title-block { flex: 1; min-width: 0; }
    .entry-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-summary {
      font-size: 0.78rem;
      color: var(--text-sec);
      line-height: 1.4;
      margin-top: 0.15rem;
    }
    .entry-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }
    .entry-badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.12rem 0.45rem;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .entry-chevron {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 0.25s;
    }
    .entry-card.open .entry-chevron { transform: rotate(180deg); }

    .entry-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .entry-card.open .entry-body {
      max-height: 10000px;
    }
    .entry-detail {
      padding: 0 1.25rem 1.25rem;
      border-top: 1px solid var(--border);
    }
    .entry-detail-content {
      font-size: 0.85rem;
      color: var(--text-sec);
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-wrap: break-word;
      padding-top: 1rem;
    }
    .entry-detail-content h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin: 1rem 0 0.4rem;
    }
    .entry-detail-content h2:first-child { margin-top: 0; }
    .entry-detail-content ul, .entry-detail-content ol {
      padding-left: 1.25rem;
      margin: 0.25rem 0 0.5rem;
    }
    .entry-detail-content li {
      font-size: 0.82rem;
      margin-bottom: 0.15rem;
    }
    .entry-detail-content code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.78rem;
      background: var(--bg);
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--orange);
    }

    .entry-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
    }
    .entry-action-btn {
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-sec);
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .entry-action-btn:hover { background: var(--border); color: var(--text); }
    .entry-action-btn.danger { color: #DC2626; }
    .entry-action-btn.danger:hover { background: #FEE2E2; color: #DC2626; border-color: #FECACA; }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* Badge colors */
    .badge-backend { background: #DBEAFE; color: #1E40AF; }
    .badge-mobile-app { background: #EDE9FE; color: #6D28D9; }
    .badge-security { background: #FEE2E2; color: #991B1B; }
    .badge-infrastructure { background: #DCFCE7; color: #166534; }
    .badge-toolkit { background: #FEF3C7; color: #92400E; }
    .badge-data-quality { background: #FFEDD5; color: #9A3412; }
    .badge-ui-ux { background: #F0ABFC33; color: #A855F7; }
    .badge-business { background: #E0F2F1; color: #047857; }
    .badge-bug-fix { background: #FEE2E2; color: #DC2626; }
    .badge-new-feature { background: #DBEAFE; color: #2563EB; }

    [data-theme="dark"] .badge-backend { background: #172554; color: #93C5FD; }
    [data-theme="dark"] .badge-mobile-app { background: #2E1065; color: #C4B5FD; }
    [data-theme="dark"] .badge-security { background: #450A0A; color: #FCA5A5; }
    [data-theme="dark"] .badge-infrastructure { background: #052E16; color: #86EFAC; }
    [data-theme="dark"] .badge-toolkit { background: #451A03; color: #FDE68A; }
    [data-theme="dark"] .badge-data-quality { background: #431407; color: #FDBA74; }
    [data-theme="dark"] .badge-ui-ux { background: #3B0764; color: #E9D5FF; }
    [data-theme="dark"] .badge-business { background: #022C22; color: #6EE7B7; }
    [data-theme="dark"] .badge-bug-fix { background: #450A0A; color: #FCA5A5; }
    [data-theme="dark"] .badge-new-feature { background: #172554; color: #93C5FD; }

    .entry-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .toolbar { padding: 1rem; }
      .container { padding: 1rem 0.75rem 2rem; }
      .form-row { flex-direction: column; }
      .top-bar { gap: 0.5rem; }
      .entry-header { flex-wrap: wrap; }
      .entry-badges { margin-top: 0.25rem; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <img src="surevera-header-white-logo.png" alt="SureVera" style="height:32px">
    <div style="width:1px;height:24px;background:rgba(255,255,255,0.2)"></div>
    <span style="font-size:0.85rem;font-weight:500;color:rgba(255,255,255,0.6)">Dev Log</span>
  </div>

  <div class="container">
    <div class="page-title">
      <h1>Dev Log</h1>
      <p>Daily development updates and progress tracking</p>
    </div>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="search-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search entries...">
      </div>
      <select class="cat-filter" id="catFilter">
        <option value="">All Categories</option>
        <option value="Backend">Backend</option>
        <option value="Mobile App">Mobile App</option>
        <option value="Security">Security</option>
        <option value="Infrastructure">Infrastructure</option>
        <option value="Toolkit">Toolkit</option>
        <option value="Data Quality">Data Quality</option>
        <option value="UI/UX">UI/UX</option>
        <option value="Business">Business</option>
        <option value="Bug Fix">Bug Fix</option>
        <option value="New Feature">New Feature</option>
      </select>
      <button class="action-btn" onclick="exportMarkdown()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
      <button class="action-btn" onclick="resetDevLog()" style="color:#DC2626">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Restore
      </button>
    </div>

    <!-- Add Entry Form -->
    <div class="form-card" id="formCard">
      <div class="form-header" onclick="toggleForm()">
        <h2>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span id="formHeaderText">Add Entry</span>
        </h2>
        <svg class="form-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="form-body">
        <div class="form-inner">
          <div class="form-row">
            <div>
              <label class="field-label">Date</label>
              <input type="date" class="field-input" id="entryDate">
            </div>
            <div>
              <label class="field-label">Title</label>
              <input type="text" class="field-input" id="entryTitle" placeholder="e.g. Beta Testing Day 3">
            </div>
          </div>
          <div>
            <label class="field-label">Summary</label>
            <textarea class="field-textarea" id="entrySummary" placeholder="Short summary of today's work..."></textarea>
          </div>
          <div>
            <label class="field-label">Details (markdown-style)</label>
            <textarea class="field-textarea large" id="entryDetails" placeholder="## Section Title&#10;- Detail item 1&#10;- Detail item 2"></textarea>
          </div>
          <div>
            <label class="field-label">Categories</label>
            <div class="cat-checkboxes" id="catCheckboxes"></div>
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <button class="save-btn" onclick="saveEntry()">Save Entry</button>
            <button class="action-btn" id="cancelEditBtn" style="display:none" onclick="cancelEdit()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <div class="entry-count" id="entryCount"></div>
    <div id="entriesList"></div>
  </div>

  <div class="footer">SureVera Dev Log -- runs entirely in your browser</div>

  <script>
    const STORAGE_KEY = 'surevera_dev_log';
    const ALL_CATEGORIES = [
      'Backend', 'Mobile App', 'Security', 'Infrastructure', 'Toolkit',
      'Data Quality', 'UI/UX', 'Business', 'Bug Fix', 'New Feature'
    ];

    // ── State ──
    let entries = loadEntries();
    let editingId = null;

    function loadEntries() {
      try {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(data) ? data : [];
      } catch { return []; }
    }
    function saveEntries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    // ── Init ──
    function init() {
      // Set date default
      document.getElementById('entryDate').value = new Date().toISOString().slice(0, 10);

      // Build category checkboxes
      const container = document.getElementById('catCheckboxes');
      ALL_CATEGORIES.forEach(cat => {
        const label = document.createElement('label');
        label.className = 'cat-checkbox';
        label.innerHTML = `<input type="checkbox" value="${cat}"> ${cat}`;
        label.addEventListener('click', () => {
          setTimeout(() => {
            label.classList.toggle('selected', label.querySelector('input').checked);
          }, 0);
        });
        container.appendChild(label);
      });

      // Seed data if empty
      if (entries.length === 0) {
        seedData();
        saveEntries();
      }

      render();

      // Bind filter events
      document.getElementById('searchInput').addEventListener('input', render);
      document.getElementById('catFilter').addEventListener('change', render);
    }

    // ── Form toggle ──
    function toggleForm() {
      document.getElementById('formCard').classList.toggle('open');
    }

    function cancelEdit() {
      editingId = null;
      clearForm();
      document.getElementById('formHeaderText').textContent = 'Add Entry';
      document.getElementById('cancelEditBtn').style.display = 'none';
    }

    function clearForm() {
      document.getElementById('entryDate').value = new Date().toISOString().slice(0, 10);
      document.getElementById('entryTitle').value = '';
      document.getElementById('entrySummary').value = '';
      document.getElementById('entryDetails').value = '';
      document.querySelectorAll('#catCheckboxes .cat-checkbox').forEach(l => {
        l.querySelector('input').checked = false;
        l.classList.remove('selected');
      });
    }

    // ── Save ──
    function saveEntry() {
      const date = document.getElementById('entryDate').value;
      const title = document.getElementById('entryTitle').value.trim();
      const summary = document.getElementById('entrySummary').value.trim();
      const details = document.getElementById('entryDetails').value.trim();
      const categories = [];
      document.querySelectorAll('#catCheckboxes input:checked').forEach(cb => {
        categories.push(cb.value);
      });

      if (!title) { alert('Please enter a title.'); return; }
      if (!date) { alert('Please enter a date.'); return; }

      if (editingId) {
        const idx = entries.findIndex(e => e.id === editingId);
        if (idx !== -1) {
          entries[idx] = { ...entries[idx], date, title, summary, details, categories };
        }
        editingId = null;
        document.getElementById('formHeaderText').textContent = 'Add Entry';
        document.getElementById('cancelEditBtn').style.display = 'none';
      } else {
        entries.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          date, title, summary, details, categories,
          createdAt: new Date().toISOString()
        });
      }

      saveEntries();
      clearForm();
      document.getElementById('formCard').classList.remove('open');
      render();
    }

    // ── Edit ──
    function editEntry(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;

      editingId = id;
      document.getElementById('entryDate').value = entry.date;
      document.getElementById('entryTitle').value = entry.title;
      document.getElementById('entrySummary').value = entry.summary || '';
      document.getElementById('entryDetails').value = entry.details || '';

      // Set categories
      document.querySelectorAll('#catCheckboxes .cat-checkbox').forEach(l => {
        const cb = l.querySelector('input');
        const checked = (entry.categories || []).includes(cb.value);
        cb.checked = checked;
        l.classList.toggle('selected', checked);
      });

      document.getElementById('formHeaderText').textContent = 'Edit Entry';
      document.getElementById('cancelEditBtn').style.display = '';
      document.getElementById('formCard').classList.add('open');
      document.getElementById('entryTitle').focus();
    }

    // ── Delete ──
    function deleteEntry(id) {
      if (!confirm('Delete this entry? This cannot be undone.')) return;
      entries = entries.filter(e => e.id !== id);
      saveEntries();
      render();
    }

    // ── Render ──
    function render() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const catFilter = document.getElementById('catFilter').value;

      let filtered = entries.slice();

      if (q) {
        filtered = filtered.filter(e => {
          const haystack = [e.title, e.summary, e.details, ...(e.categories || [])].join(' ').toLowerCase();
          return haystack.includes(q);
        });
      }
      if (catFilter) {
        filtered = filtered.filter(e => (e.categories || []).includes(catFilter));
      }

      // Sort newest first
      filtered.sort((a, b) => b.date.localeCompare(a.date));

      const countEl = document.getElementById('entryCount');
      countEl.textContent = filtered.length + ' entr' + (filtered.length === 1 ? 'y' : 'ies') + (q || catFilter ? ' (filtered)' : '');

      const list = document.getElementById('entriesList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">No entries found. Add your first dev log entry above.</div>';
        return;
      }

      list.innerHTML = '';
      filtered.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.dataset.id = entry.id;

        const badgesHTML = (entry.categories || []).map(cat => {
          const cls = 'badge-' + cat.toLowerCase().replace(/[\s\/]+/g, '-');
          return `<span class="entry-badge ${cls}">${esc(cat)}</span>`;
        }).join('');

        const formattedDate = formatDate(entry.date);

        card.innerHTML = `
          <div class="entry-header" onclick="toggleEntry('${entry.id}')">
            <span class="entry-date">${formattedDate}</span>
            <div class="entry-title-block">
              <div class="entry-title">${esc(entry.title)}</div>
              <div class="entry-summary">${esc(entry.summary || '')}</div>
            </div>
            <div class="entry-badges">${badgesHTML}</div>
            <svg class="entry-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

    function toggleEntry(id) {

      if (card) card.classList.toggle('open');
    }

    // ── Helpers ──
    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderMarkdown(text) {
      if (!text) return '';
      // Escape HTML first
      let html = esc(text);
      // ## headings
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      // **bold**
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // `code`
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Lines starting with - as list items (group consecutive)
      html = html.replace(/((?:^- .+\n?)+)/gm, function(block) {
        const items = block.trim().split('\n').map(line => {
          return '<li>' + line.replace(/^- /, '') + '</li>';
        }).join('');
        return '<ul>' + items + '</ul>';
      });
      // Blank lines as paragraph breaks
      html = html.replace(/\n\n+/g, '<br><br>');
      html = html.replace(/\n/g, '\n');
      return html;
    }

        if (entry.categories && entry.categories.length) {
          md += '**Categories:** ' + entry.categories.join(', ') + '\n';
        }
        if (entry.summary) {
          md += '**Summary:** ' + entry.summary + '\n';
        }
        md += '\n' + (entry.details || '') + '\n\n---\n\n';
      });

      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'surevera-dev-log-' + new Date().toISOString().slice(0, 10) + '.md';
      a.click();
      URL.revokeObjectURL(url);
