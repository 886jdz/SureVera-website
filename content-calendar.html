<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Calendar &mdash; SureVera</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B3A6B;
      --dark-navy: #0D1B2E;
      --orange: #E8612A;
      --bg: #F4F5F7;
      --card-bg: #FFFFFF;
      --text: #1a1a1a;
      --text-secondary: #6B7280;
      --border: #E5E7EB;
      --footer-bg: #F9FAFB;
      --footer-text: #9CA3AF;
      --hover-bg: #F9FAFB;
      --modal-overlay: rgba(0,0,0,0.45);
      --input-bg: #FFFFFF;
      --input-border: #D1D5DB;
      --badge-draft: #FEF3C7;
      --badge-draft-text: #92400E;
      --badge-scheduled: #DBEAFE;
      --badge-scheduled-text: #1E40AF;
      --badge-posted: #D1FAE5;
      --badge-posted-text: #065F46;
      --day-today: #EFF6FF;
      --day-hover: #F0F4FF;
      --day-other-month: #F9FAFB;
      --day-other-text: #D1D5DB;
      --upcoming-bg: #FFFFFF;
      --summary-bg: #FFFFFF;
      --template-bg: #F9FAFB;
      --template-hover: #F0F4FF;
      --filter-bg: #FFFFFF;
      --tab-inactive: rgba(255,255,255,0.5);
    }

    body.dark-mode, [data-theme="dark"],
    [data-theme="dark"] {
      --bg: #0F1318;
      --card-bg: #1A1F28;
      --text: #E5E7EB;
      --text-secondary: #9CA3AF;
      --border: #2D3342;
      --footer-bg: #141920;
      --footer-text: #6B7280;
      --hover-bg: #1F2533;
      --modal-overlay: rgba(0,0,0,0.7);
      --input-bg: #1A1F28;
      --input-border: #3D4455;
      --badge-draft: #422006;
      --badge-draft-text: #FCD34D;
      --badge-scheduled: #1E3A5F;
      --badge-scheduled-text: #93C5FD;
      --badge-posted: #064E3B;
      --badge-posted-text: #6EE7B7;
      --day-today: #1B2A4A;
      --day-hover: #1F2533;
      --day-other-month: #141920;
      --day-other-text: #4B5563;
      --upcoming-bg: #1A1F28;
      --summary-bg: #1A1F28;
      --template-bg: #1A1F28;
      --template-hover: #1F2533;
      --filter-bg: #1A1F28;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .toolbar {
      background: linear-gradient(135deg, #0D1B2E 0%, #1B3A6B 100%);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Top controls bar */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .view-tabs {
      display: flex;
      background: var(--navy);
      border-radius: 8px;
      overflow: hidden;
    }

    .view-tab {
      padding: 0.5rem 1.25rem;
      border: none;
      background: transparent;
      color: var(--tab-inactive);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-tab.active {
      background: var(--orange);
      color: #fff;
    }

    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filters select {
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background: var(--filter-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* Calendar navigation */
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      margin-bottom: 1rem;
    }

    .calendar-nav h2 {
      font-size: 1.3rem;
      font-weight: 700;
      min-width: 220px;
      text-align: center;
    }

    .nav-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .nav-btn:hover { background: var(--hover-bg); border-color: var(--navy); }

    .today-btn {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--orange);
      background: transparent;
      color: var(--orange);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .today-btn:hover { background: var(--orange); color: #fff; }

    /* Calendar grid */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--card-bg);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .day-header {
      padding: 0.6rem;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      background: var(--hover-bg);
      border-bottom: 1px solid var(--border);
    }

    .day-cell {
      min-height: 100px;
      padding: 0.4rem;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .day-cell:nth-child(7n) { border-right: none; }

    .day-cell:hover { background: var(--day-hover); }

    .day-cell.other-month {
      background: var(--day-other-month);
    }

    .day-cell.other-month .day-number { color: var(--day-other-text); }

    .day-cell.today {
      background: var(--day-today);
    }

    .day-cell.today .day-number {
      background: var(--orange);
      color: #fff;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-number {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: var(--text);
    }

    .day-dots {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .content-dot {
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: 4px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      font-weight: 500;
      line-height: 1.4;
    }

    .content-dot:hover { opacity: 0.85; }

    .more-items {
      font-size: 0.65rem;
      color: var(--text-secondary);
      font-weight: 500;
      padding-left: 2px;
    }

    /* Platform colors */
    .platform-instagram { background: linear-gradient(135deg, #833AB4, #E1306C); }
    .platform-tiktok { background: #010101; }
    .platform-twitter { background: #1DA1F2; }
    .platform-facebook { background: #1877F2; }
    .platform-linkedin { background: #0A66C2; }
    .platform-blog { background: var(--navy); }
    .platform-email { background: #6B7280; }
    .platform-all { background: var(--orange); }

    /* Sidebar panels */
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1.25rem;
      align-items: start;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    .sidebar { display: flex; flex-direction: column; gap: 1rem; }

    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .panel h3 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--navy);
    }

    body.dark-mode, [data-theme="dark"],
    [data-theme="dark"] .panel h3 { color: #93C5FD; }

    /* Upcoming items */
    .upcoming-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .upcoming-item:last-child { border-bottom: none; }

    .upcoming-date {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 48px;
    }

    .upcoming-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .upcoming-title {
      font-size: 0.8rem;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upcoming-empty {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 1rem 0;
    }

    /* Quick templates */
    .template-btn {
      display: block;
      width: 100%;
      padding: 0.55rem 0.75rem;
      margin-bottom: 0.4rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--template-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }

    .template-btn:last-child { margin-bottom: 0; }
    .template-btn:hover { background: var(--template-hover); border-color: var(--navy); }

    .template-icon { margin-right: 0.4rem; }

    /* Monthly summary */
    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.35rem 0;
      font-size: 0.8rem;
    }

    .summary-platform {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .summary-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .summary-count {
      font-weight: 700;
      color: var(--navy);
    }

    body.dark-mode, [data-theme="dark"],
    [data-theme="dark"] .summary-count { color: #93C5FD; }

    /* List view */
    .list-view { display: none; }
    .list-view.active { display: block; }
    .calendar-view.hidden { display: none; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .list-item:hover { border-color: var(--navy); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    .list-date-col {
      min-width: 60px;
      text-align: center;
    }

    .list-date-day {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }

    .list-date-month {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 600;
    }

    .list-info { flex: 1; min-width: 0; }

    .list-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.15rem;
    }

    .list-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .list-badges {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .badge-draft { background: var(--badge-draft); color: var(--badge-draft-text); }
    .badge-scheduled { background: var(--badge-scheduled); color: var(--badge-scheduled-text); }
    .badge-posted { background: var(--badge-posted); color: var(--badge-posted-text); }

    .platform-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      color: #fff;
    }

    .list-empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 3rem 1rem;
      font-size: 0.9rem;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 1rem;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--hover-bg);
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover { background: var(--border); }

    .modal-body { padding: 1.25rem 1.5rem; }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: var(--text-secondary);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(27,58,107,0.1);
    }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: 0.55rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--orange);
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover { background: #d4551f; }

    .btn-secondary {
      background: var(--hover-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--border); }

    .btn-delete {
      background: transparent;
      color: #DC2626;
      border: 1px solid #FCA5A5;
      margin-right: auto;
    }

    .btn-delete:hover { background: #FEE2E2; }

    body.dark-mode, [data-theme="dark"],
    [data-theme="dark"] .btn-delete { border-color: #7F1D1D; color: #F87171; }
    body.dark-mode, [data-theme="dark"],
    [data-theme="dark"] .btn-delete:hover { background: #3B1111; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: var(--footer-text);
      background: var(--footer-bg);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    /* Confirm dialog */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      z-index: 1100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .confirm-overlay.active { display: flex; }

    .confirm-box {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .confirm-box p {
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .confirm-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <img src="surevera-header-white-logo.png" alt="SureVera" style="height:32px">
    <div style="width:1px;height:24px;background:rgba(255,255,255,0.2)"></div>
    <span style="font-size:0.85rem;font-weight:500;color:rgba(255,255,255,0.6)">Content Calendar</span>
  </div>

  <div class="container">

    <!-- Controls bar -->
    <div class="controls-bar">
      <div class="view-tabs">
        <button class="view-tab active" onclick="setView('calendar')">Calendar</button>
        <button class="view-tab" onclick="setView('list')">List</button>
      </div>
      <div class="filters">
        <select id="filterPlatform" onchange="render()">
          <option value="">All Platforms</option>
          <option value="Instagram">Instagram</option>
          <option value="TikTok">TikTok</option>
          <option value="Twitter/X">Twitter/X</option>
          <option value="Facebook">Facebook</option>
          <option value="LinkedIn">LinkedIn</option>
          <option value="Blog">Blog</option>
          <option value="Email">Email</option>
          <option value="All">All Platforms Post</option>
        </select>
        <select id="filterType" onchange="render()">
          <option value="">All Types</option>
          <option value="City Launch">City Launch</option>
          <option value="Feature Announcement">Feature Announcement</option>
          <option value="Health Tip">Health Tip</option>
          <option value="Testimonial">Testimonial</option>
          <option value="Promo">Promo</option>
          <option value="Behind the Scenes">Behind the Scenes</option>
          <option value="Other">Other</option>
        </select>
        <select id="filterStatus" onchange="render()">
          <option value="">All Statuses</option>
          <option value="Draft">Draft</option>
          <option value="Scheduled">Scheduled</option>
          <option value="Posted">Posted</option>
        </select>
      </div>
    </div>

    <div class="layout">

      <!-- Main area -->
      <div>
        <!-- Calendar view -->
        <div class="calendar-view" id="calendarView">
          <div class="calendar-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
            <h2 id="monthLabel"></h2>
            <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
            <button class="today-btn" onclick="goToday()">Today</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <!-- List view -->
        <div class="list-view" id="listView"></div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Upcoming -->
        <div class="panel">
          <h3>Upcoming (Next 7 Days)</h3>
          <div id="upcomingList"></div>
        </div>

        <!-- Quick templates -->
        <div class="panel">
          <h3>Quick-Add Templates</h3>
          <button class="template-btn" onclick="useTemplate('cityLaunch')">
            <span class="template-icon">&#127961;</span> New City Launch
          </button>
          <button class="template-btn" onclick="useTemplate('appUpdate')">
            <span class="template-icon">&#128241;</span> App Update
          </button>
          <button class="template-btn" onclick="useTemplate('healthTip')">
            <span class="template-icon">&#128154;</span> Health Tip Tuesday
          </button>
          <button class="template-btn" onclick="useTemplate('testimonial')">
            <span class="template-icon">&#11088;</span> Testimonial Thursday
          </button>
        </div>

        <!-- Monthly summary -->
        <div class="panel">
          <h3>Monthly Summary</h3>
          <div id="monthlySummary"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Item modal -->
  <div class="modal-overlay" id="itemModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Content</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="fieldTitle" placeholder="Post title...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Platform</label>
            <select id="fieldPlatform">
              <option value="Instagram">Instagram</option>
              <option value="TikTok">TikTok</option>
              <option value="Twitter/X">Twitter/X</option>
              <option value="Facebook">Facebook</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="Blog">Blog</option>
              <option value="Email">Email</option>
              <option value="All">All</option>
            </select>
          </div>
          <div class="form-group">
            <label>Content Type</label>
            <select id="fieldContentType">
              <option value="City Launch">City Launch</option>
              <option value="Feature Announcement">Feature Announcement</option>
              <option value="Health Tip">Health Tip</option>
              <option value="Testimonial">Testimonial</option>
              <option value="Promo">Promo</option>
              <option value="Behind the Scenes">Behind the Scenes</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select id="fieldStatus">
              <option value="Draft">Draft</option>
              <option value="Scheduled">Scheduled</option>
              <option value="Posted">Posted</option>
            </select>
          </div>
          <div class="form-group">
            <label>Time (optional)</label>
            <input type="time" id="fieldTime">
          </div>
        </div>
        <div class="form-group">
          <label>Description / Notes</label>
          <textarea id="fieldNotes" placeholder="Content details, captions, hashtags..."></textarea>
        </div>
        <input type="hidden" id="fieldDate">
        <input type="hidden" id="fieldId">
      </div>
      <div class="modal-actions">
        <button class="btn btn-delete" id="deleteBtn" onclick="confirmDelete()" style="display:none">Delete</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm delete dialog -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p>Delete this content item?</p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" onclick="cancelDelete()">Cancel</button>
        <button class="btn btn-delete" onclick="doDelete()">Delete</button>
      </div>
    </div>
  </div>

  <div class="footer">SureVera Content Calendar &mdash; runs entirely in your browser</div>

  <script>
    const STORAGE_KEY = 'surevera_content_calendar';
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    let currentYear, currentMonth; // 0-indexed month
    let currentView = 'calendar';
    let items = [];
    let editingId = null;

    const PLATFORM_CLASS = {
      'Instagram': 'platform-instagram',
      'TikTok': 'platform-tiktok',
      'Twitter/X': 'platform-twitter',
      'Facebook': 'platform-facebook',
      'LinkedIn': 'platform-linkedin',
      'Blog': 'platform-blog',
      'Email': 'platform-email',
      'All': 'platform-all'
    };

    const PLATFORM_COLOR = {
      'Instagram': '#C13584',
      'TikTok': '#010101',
      'Twitter/X': '#1DA1F2',
      'Facebook': '#1877F2',
      'LinkedIn': '#0A66C2',
      'Blog': '#1B3A6B',
      'Email': '#6B7280',
      'All': '#E8612A'
    };

    const TEMPLATES = {
      cityLaunch: {
        title: 'SureVera is now live in [City]!',
        platform: 'All',
        contentType: 'City Launch',
        status: 'Draft',
        notes: 'Announce our expansion to [City]. Include:\n- Number of restaurants covered\n- Key neighborhoods\n- Download link\n\nHashtags: #SureVera #FoodSafety #[City]'
      },
      appUpdate: {
        title: 'New in SureVera v[X.X]',
        platform: 'All',
        contentType: 'Feature Announcement',
        status: 'Draft',
        notes: 'Highlight the latest release:\n- Key new feature\n- Screenshots / screen recording\n- User benefit statement\n\nHashtags: #SureVera #AppUpdate #FoodSafety'
      },
      healthTip: {
        title: 'Health Tip Tuesday',
        platform: 'Instagram',
        contentType: 'Health Tip',
        status: 'Draft',
        notes: 'Weekly health tip post:\n- Topic: [e.g. How to read inspection scores]\n- Carousel or single image\n- Educational, not promotional\n\nHashtags: #HealthTipTuesday #FoodSafety #SureVera'
      },
      testimonial: {
        title: 'Testimonial Thursday',
        platform: 'Instagram',
        contentType: 'Testimonial',
        status: 'Draft',
        notes: 'Share a user story:\n- Quote from user\n- Before/after experience\n- City they use SureVera in\n\nHashtags: #TestimonialThursday #SureVera #RealUsers'
      }
    };

    // Init
    function init() {
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();
      load();
      render();
    }

    function load() {
      try {
        items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch { items = []; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function getFiltered() {
      const pf = document.getElementById('filterPlatform').value;
      const tf = document.getElementById('filterType').value;
      const sf = document.getElementById('filterStatus').value;
      return items.filter(i => {
        if (pf && i.platform !== pf) return false;
        if (tf && i.contentType !== tf) return false;
        if (sf && i.status !== sf) return false;
        return true;
      });
    }

    // Views
    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && view === 'calendar') || (i === 1 && view === 'list'));
      });
      document.getElementById('calendarView').classList.toggle('hidden', view !== 'calendar');
      document.getElementById('listView').classList.toggle('active', view === 'list');
      render();
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      render();
    }

    function goToday() {
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();
      render();
    }

    // Render
    function render() {
      renderCalendar();
      renderListView();
      renderUpcoming();
      renderSummary();
    }

    function renderCalendar() {
      document.getElementById('monthLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      // Day headers
      DAYS.forEach(d => {
        const el = document.createElement('div');
        el.className = 'day-header';
        el.textContent = d;
        grid.appendChild(el);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      const filtered = getFiltered();

      // Previous month days
      for (let i = firstDay - 1; i >= 0; i--) {
        const day = prevMonthDays - i;
        const pm = currentMonth === 0 ? 11 : currentMonth - 1;
        const py = currentMonth === 0 ? currentYear - 1 : currentYear;
        const dateStr = `${py}-${String(pm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        grid.appendChild(createDayCell(day, dateStr, true, false));
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const isToday = dateStr === todayStr;
        const dayItems = filtered.filter(i => i.date === dateStr);
        grid.appendChild(createDayCell(day, dateStr, false, isToday, dayItems));
      }

      // Next month days
      const totalCells = firstDay + daysInMonth;
      const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let day = 1; day <= remaining; day++) {
        const nm = currentMonth === 11 ? 0 : currentMonth + 1;
        const ny = currentMonth === 11 ? currentYear + 1 : currentYear;
        const dateStr = `${ny}-${String(nm+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        grid.appendChild(createDayCell(day, dateStr, true, false));
      }
    }

    function createDayCell(day, dateStr, isOtherMonth, isToday, dayItems) {
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isOtherMonth ? ' other-month' : '') + (isToday ? ' today' : '');
      cell.onclick = () => openModal(dateStr);

      const num = document.createElement('div');
      num.className = 'day-number';
      num.textContent = day;
      cell.appendChild(num);

      if (dayItems && dayItems.length > 0) {
        const dots = document.createElement('div');
        dots.className = 'day-dots';
        const show = dayItems.slice(0, 3);
        show.forEach(item => {
          const dot = document.createElement('div');
          dot.className = 'content-dot ' + (PLATFORM_CLASS[item.platform] || 'platform-all');
          dot.textContent = item.title;
          dot.onclick = (e) => { e.stopPropagation(); openModal(dateStr, item.id); };
          dots.appendChild(dot);
        });
        if (dayItems.length > 3) {
          const more = document.createElement('div');
          more.className = 'more-items';
          more.textContent = `+${dayItems.length - 3} more`;
          dots.appendChild(more);
        }
        cell.appendChild(dots);
      }

      return cell;
    }

    function renderListView() {
      const container = document.getElementById('listView');
      const filtered = getFiltered().sort((a, b) => {
        const d = a.date.localeCompare(b.date);
        if (d !== 0) return d;
        return (a.time || '').localeCompare(b.time || '');
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="list-empty">No content items yet. Click a day on the calendar or use a template to get started.</div>';
        return;
      }

      container.innerHTML = filtered.map(item => {
        const d = new Date(item.date + 'T00:00:00');
        const dayNum = d.getDate();
        const monthShort = MONTHS[d.getMonth()].slice(0, 3);
        const timeStr = item.time ? ` at ${item.time}` : '';
        const statusClass = 'badge-' + item.status.toLowerCase();
        const platClass = PLATFORM_CLASS[item.platform] || 'platform-all';

        return `<div class="list-item" onclick="openModal('${item.date}', '${item.id}')">
          <div class="list-date-col">
            <div class="list-date-day">${dayNum}</div>
            <div class="list-date-month">${monthShort}</div>
          </div>
          <div class="list-info">
            <div class="list-title">${escHtml(item.title)}</div>
            <div class="list-meta">${item.contentType}${timeStr}</div>
          </div>
          <div class="list-badges">
            <span class="platform-badge ${platClass}">${item.platform}</span>
            <span class="badge ${statusClass}">${item.status}</span>
          </div>
        </div>`;
      }).join('');
    }

    function renderUpcoming() {
      const container = document.getElementById('upcomingList');
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const weekLater = new Date(today);
      weekLater.setDate(weekLater.getDate() + 7);

      const upcoming = items.filter(i => {
        const d = new Date(i.date + 'T00:00:00');
        return d >= today && d <= weekLater && i.status !== 'Posted';
      }).sort((a, b) => {
        const d = a.date.localeCompare(b.date);
        if (d !== 0) return d;
        return (a.time || '').localeCompare(b.time || '');
      });

      if (upcoming.length === 0) {
        container.innerHTML = '<div class="upcoming-empty">No upcoming content in the next 7 days.</div>';
        return;
      }

      container.innerHTML = upcoming.map(item => {
        const d = new Date(item.date + 'T00:00:00');
        const label = formatShortDate(d);
        const color = PLATFORM_COLOR[item.platform] || '#E8612A';
        return `<div class="upcoming-item" onclick="openModal('${item.date}', '${item.id}')">
          <div class="upcoming-date">${label}</div>
          <div class="upcoming-dot" style="background:${color}"></div>
          <div class="upcoming-title">${escHtml(item.title)}</div>
        </div>`;
      }).join('');
    }

    function formatShortDate(d) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diff = Math.round((d - today) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Tomorrow';
      return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
    }

    function renderSummary() {
      const container = document.getElementById('monthlySummary');
      const monthItems = items.filter(i => {
        const d = new Date(i.date + 'T00:00:00');
        return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
      });

      const counts = {};
      monthItems.forEach(i => { counts[i.platform] = (counts[i.platform] || 0) + 1; });

      const platforms = Object.keys(PLATFORM_COLOR);
      const rows = platforms
        .filter(p => counts[p])
        .map(p => `<div class="summary-row">
          <div class="summary-platform">
            <div class="summary-dot" style="background:${PLATFORM_COLOR[p]}"></div>
            <span>${p}</span>
          </div>
          <span class="summary-count">${counts[p]}</span>
        </div>`);

      if (rows.length === 0) {
        container.innerHTML = '<div class="upcoming-empty">No posts this month.</div>';
      } else {
        const total = monthItems.length;
        container.innerHTML = rows.join('') +
          `<div class="summary-row" style="border-top:1px solid var(--border);margin-top:0.5rem;padding-top:0.5rem;">
            <div class="summary-platform"><strong>Total</strong></div>
            <span class="summary-count">${total}</span>
          </div>`;
      }
    }

    // Modal
    function openModal(dateStr, itemId) {
      editingId = itemId || null;
      const modal = document.getElementById('itemModal');

      if (editingId) {
        const item = items.find(i => i.id === editingId);
        if (!item) return;
        document.getElementById('modalTitle').textContent = 'Edit Content';
        document.getElementById('fieldTitle').value = item.title;
        document.getElementById('fieldPlatform').value = item.platform;
        document.getElementById('fieldContentType').value = item.contentType;
        document.getElementById('fieldStatus').value = item.status;
        document.getElementById('fieldTime').value = item.time || '';
        document.getElementById('fieldNotes').value = item.notes || '';
        document.getElementById('fieldDate').value = item.date;
        document.getElementById('fieldId').value = item.id;
        document.getElementById('deleteBtn').style.display = '';
      } else {
        document.getElementById('modalTitle').textContent = 'Add Content';
        document.getElementById('fieldTitle').value = '';
        document.getElementById('fieldPlatform').value = 'Instagram';
        document.getElementById('fieldContentType').value = 'Other';
        document.getElementById('fieldStatus').value = 'Draft';
        document.getElementById('fieldTime').value = '';
        document.getElementById('fieldNotes').value = '';
        document.getElementById('fieldDate').value = dateStr;
        document.getElementById('fieldId').value = '';
        document.getElementById('deleteBtn').style.display = 'none';
      }

      modal.classList.add('active');
      setTimeout(() => document.getElementById('fieldTitle').focus(), 100);
    }

    function closeModal() {
      document.getElementById('itemModal').classList.remove('active');
      editingId = null;
    }

    function saveItem() {
      const title = document.getElementById('fieldTitle').value.trim();
      if (!title) { document.getElementById('fieldTitle').focus(); return; }

      const data = {
        id: document.getElementById('fieldId').value || generateId(),
        title,
        platform: document.getElementById('fieldPlatform').value,
        contentType: document.getElementById('fieldContentType').value,
        status: document.getElementById('fieldStatus').value,
        time: document.getElementById('fieldTime').value || '',
        notes: document.getElementById('fieldNotes').value,
        date: document.getElementById('fieldDate').value
      };

      const existingIdx = items.findIndex(i => i.id === data.id);
      if (existingIdx >= 0) {
        items[existingIdx] = data;
      } else {
        items.push(data);
      }

      save();
      closeModal();
      render();
    }

    // Delete
    function confirmDelete() {
      document.getElementById('confirmOverlay').classList.add('active');
    }

    function cancelDelete() {
      document.getElementById('confirmOverlay').classList.remove('active');
    }

    function doDelete() {
      const id = document.getElementById('fieldId').value;
      items = items.filter(i => i.id !== id);
      save();
      document.getElementById('confirmOverlay').classList.remove('active');
      closeModal();
      render();
    }

    // Templates
    function useTemplate(key) {
      const t = TEMPLATES[key];
      if (!t) return;

      const today = new Date();
      let targetDate = today;

      // Health Tip Tuesday — find next Tuesday
      if (key === 'healthTip') {
        const day = today.getDay();
        const daysUntil = (2 - day + 7) % 7 || 7;
        targetDate = new Date(today);
        targetDate.setDate(today.getDate() + daysUntil);
      }
      // Testimonial Thursday — find next Thursday
      else if (key === 'testimonial') {
        const day = today.getDay();
        const daysUntil = (4 - day + 7) % 7 || 7;
        targetDate = new Date(today);
        targetDate.setDate(today.getDate() + daysUntil);
      }

      const dateStr = `${targetDate.getFullYear()}-${String(targetDate.getMonth()+1).padStart(2,'0')}-${String(targetDate.getDate()).padStart(2,'0')}`;

      // Navigate calendar to that month
      currentYear = targetDate.getFullYear();
      currentMonth = targetDate.getMonth();

      // Open modal with template data pre-filled
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add Content';
      document.getElementById('fieldTitle').value = t.title;
      document.getElementById('fieldPlatform').value = t.platform;
      document.getElementById('fieldContentType').value = t.contentType;
      document.getElementById('fieldStatus').value = t.status;
      document.getElementById('fieldTime').value = '';
      document.getElementById('fieldNotes').value = t.notes;
      document.getElementById('fieldDate').value = dateStr;
      document.getElementById('fieldId').value = '';
      document.getElementById('deleteBtn').style.display = 'none';

      document.getElementById('itemModal').classList.add('active');
      setTimeout(() => document.getElementById('fieldTitle').focus(), 100);

      render();
    }

    // Helpers
    function generateId() {
      return 'cc_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Close modals on overlay click
    document.getElementById('itemModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('confirmOverlay').addEventListener('click', function(e) {
      if (e.target === this) cancelDelete();
    });

    // Keyboard
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (document.getElementById('confirmOverlay').classList.contains('active')) {
          cancelDelete();
        } else if (document.getElementById('itemModal').classList.contains('active')) {
          closeModal();
        }
      }
    });

    init();
  </script>

  <script src="dark-mode.js"></script>
  <script src="toolkit-nav.js"></script>
</body>
</html>
