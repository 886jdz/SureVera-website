<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SureVera — Links</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #F0F3F8 0%, #E8ECF2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px 60px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 80px;
      height: auto;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeInDown 0.6s ease forwards;
    }

    .app-name {
      font-size: 28px;
      font-weight: 700;
      color: #1B3A6B;
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeInDown 0.6s ease 0.1s forwards;
    }

    .tagline {
      font-size: 16px;
      color: #6B7A8D;
      font-weight: 500;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeInDown 0.6s ease 0.15s forwards;
    }

    .description {
      font-size: 14px;
      color: #8A95A5;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
      opacity: 0;
      animation: fadeInDown 0.6s ease 0.2s forwards;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      height: 48px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: none;
      position: relative;
      opacity: 0;
      animation: fadeInUp 0.5s ease forwards;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .link-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .link-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .link-btn:nth-child(1) { animation-delay: 0.3s; }
    .link-btn:nth-child(2) { animation-delay: 0.4s; }
    .link-btn:nth-child(3) { animation-delay: 0.5s; }
    .link-btn:nth-child(4) { animation-delay: 0.6s; }
    .link-btn:nth-child(5) { animation-delay: 0.7s; }
    .link-btn:nth-child(6) { animation-delay: 0.8s; }

    /* App Store */
    .btn-appstore {
      background: #FFFFFF;
      color: #1B3A6B;
      border: 2px solid #1B3A6B;
    }

    /* Google Play */
    .btn-playstore {
      background: #FFFFFF;
      color: #1B3A6B;
      border: 2px solid #1B3A6B;
    }

    /* Website */
    .btn-website {
      background: #1B3A6B;
      color: #FFFFFF;
    }

    /* Instagram */
    .btn-instagram {
      background: linear-gradient(45deg, #F09433, #E6683C, #DC2743, #CC2366, #BC1888);
      color: #FFFFFF;
    }

    /* TikTok */
    .btn-tiktok {
      background: #000000;
      color: #FFFFFF;
    }

    /* Contact */
    .btn-contact {
      background: #E8612A;
      color: #FFFFFF;
    }

    .footer {
      font-size: 13px;
      color: #A0AAB8;
      text-align: center;
      opacity: 0;
      animation: fadeInUp 0.5s ease 0.9s forwards;
    }

    .footer span {
      color: #E8612A;
      font-weight: 600;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="SureVera Logo" class="logo">
    <h1 class="app-name">SureVera</h1>
    <p class="tagline">Be Sure. Verify.</p>
    <p class="description">Real restaurant health inspection grades for 90+ US cities</p>

        </svg>
        Follow on TikTok

      <!-- Contact -->
      <a href="mailto:support@arriotech.com" class="link-btn btn-contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>

    </div>

    <div class="footer">
      Made with <span>SureVera</span> &middot; <script>document.write(new Date().getFullYear())</script>
    </div>
  </div>

  <script src="dark-mode.js"></script>
<script src="toolkit-nav.js"></script>
</body>
</html>
